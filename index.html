<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curso de Contabilidade Professor Moreira</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061a3a;color:#fff}
.app{max-width:460px;margin:0 auto;min-height:100vh;padding:14px;display:flex;flex-direction:column;gap:12px}
header{background:#092b5c;border:2px solid #fff;border-radius:18px;padding:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25)}
header h1{font-size:22px;margin:0;line-height:1.15;text-transform:uppercase}
header p{font-size:17px;margin:8px 0 0;font-weight:700;color:#dbeafe}
.status{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
.badge{background:#0b2f66;border-radius:12px;padding:9px 6px;font-weight:700;font-size:15px;border:1px solid rgba(255,255,255,.25)}
.progress{height:12px;background:#03152e;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.3)}
.progress div{height:100%;width:0%;background:#ffeb3b;transition:.3s}
.card{background:#0b2f66;border-radius:20px;padding:18px;box-shadow:0 0 14px rgba(255,255,255,.15);flex:1;border:1px solid rgba(255,255,255,.25)}
.questao-numero{font-size:24px;font-weight:800;color:#ffeb3b;margin-bottom:10px}
.banca{font-size:18px;font-weight:800;color:#b9d9ff;margin-bottom:14px;line-height:1.25}
.pergunta{font-size:21px;line-height:1.45;margin-bottom:18px;font-weight:600}
.alternativa{display:block;width:100%;background:#fff;color:#061a3a;border:0;border-radius:14px;padding:14px;margin:10px 0;font-size:19px;text-align:left;font-weight:800;line-height:1.3;cursor:pointer}
.alternativa:active{transform:scale(.99)}
.correta{background:#22c55e!important;color:#fff!important}
.errada{background:#ef4444!important;color:#fff!important}
.comentario{display:none;background:#03152e;border-left:7px solid #ffeb3b;margin-top:18px;padding:15px;border-radius:14px;font-size:18.5px;line-height:1.45}
.comentario h3{color:#ffeb3b;margin:0 0 8px;font-size:22px}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button.navbtn,.whatsbtn{padding:14px 8px;border:0;border-radius:14px;font-size:17px;font-weight:900;cursor:pointer}
.navbtn{background:#ffeb3b;color:#061a3a}.restart{background:#fff;color:#061a3a}.whatsbtn{width:100%;background:#25D366;color:white;font-size:20px;padding:17px}.finish{background:#03152e;border-radius:18px;padding:18px;text-align:center;border:2px solid #ffeb3b}.finish h2{color:#ffeb3b;font-size:28px;margin:0 0 12px}.finish p{font-size:21px;font-weight:800}.small{font-size:15px;color:#dbeafe;line-height:1.35}footer{text-align:center;font-size:15px;color:#dbeafe;font-weight:800;padding-bottom:8px}
@media print{body{background:#fff;color:#000}.app{max-width:100%;padding:0}header,.status,.progress,.nav,.whatsbtn,footer{display:none}.card{box-shadow:none;border:0;background:#fff;color:#000}.comentario{display:block!important;color:#000;background:#fff;border-left:5px solid #000}.alternativa{border:1px solid #000;color:#000}}
</style>
</head>
<body>
<div class="app">
<header>
<h1>Curso de Contabilidade<br>Professor Moreira</h1>
<p>WhatsApp: (61) 98532-3574</p>
</header>
<div class="status">
<div class="badge" id="qtd">Questão 1/10</div>
<div class="badge" id="acertos">✅ 0</div>
<div class="badge" id="erros">❌ 0</div>
</div>
<div class="progress"><div id="bar"></div></div>
<div class="card"><div id="quiz"></div></div>
<div class="nav">
<button class="navbtn" onclick="voltar()">⬅ Voltar</button>
<button class="navbtn restart" onclick="reiniciar()">🔄 Reiniciar</button>
<button class="navbtn" onclick="proxima()">Próxima ➡</button>
</div>
<button class="whatsbtn" onclick="enviarWhatsApp()">📲 Enviar Gabarito para o WhatsApp</button>
<footer>Curso de Contabilidade Professor Moreira – WhatsApp (61) 98532-3574</footer>
</div>
<script>
const questoes=[
{numero:1,banca:'FGV – Agente – PC/RN – 2021',pergunta:'O contador registrou diretamente em uma conta de resultado (despesa) a aquisição de material de expediente para estoque, que só deveria ser baixado como despesa quando requisitado. Para efetuar a retificação do lançamento contábil, deve-se realizar um(a):',alternativas:['A) Compensação','B) Complementação','C) Estorno total','D) Estorno parcial','E) Transferência'],correta:4,comentario:'O material de expediente ainda não foi consumido. Portanto, antes da requisição, ele representa estoque, ou seja, ativo. O erro ocorreu apenas na conta debitada: foi usada despesa em vez de estoque. Como o crédito em Caixa está correto, não é necessário estornar tudo. Basta transferir o valor da despesa para a conta Estoque de Material de Expediente. Gabarito: E.'},
{numero:2,banca:'FGV – Contador – INEA – 2013',pergunta:'A teoria da contabilidade que divide as contas em patrimoniais e de resultado é denominada:',alternativas:['A) Reditualista','B) Personalista','C) Aziendalista','D) Materialista','E) Patrimonialista'],correta:4,comentario:'A Teoria Patrimonialista é a teoria adotada atualmente pela contabilidade. Ela divide as contas em patrimoniais, que compreendem ativo, passivo e patrimônio líquido, e contas de resultado, que compreendem receitas e despesas. Gabarito: E.'},
{numero:3,banca:'FGV – Contador – SUDENE – 2013',pergunta:'Assinale a alternativa que indica as contas que são classificadas como patrimoniais, integrais e em agentes consignatários concomitantemente.',alternativas:['A) Clientes, fornecedores e capital social','B) Salários a pagar, reserva de lucros e caixa','C) Receita, despesa com pessoal e custo de mercadorias vendidas','D) Estoque, banco conta movimento e veículo','E) Empréstimos a receber, empréstimos a pagar e dividendos a pagar'],correta:3,comentario:'Para ser patrimonial, integral e agente consignatário ao mesmo tempo, a conta precisa representar um bem. Na Teoria Personalista, os agentes consignatários são responsáveis pelos bens da empresa. Estoque, banco conta movimento e veículo são bens. Por isso, a alternativa correta é a letra D.'},
{numero:4,banca:'FGV – Especialista – SEMSA Manaus – 2022',pergunta:'À luz da Teoria das Contas, analise: I. O custo da mercadoria vendida é uma conta dos proprietários, segundo a Teoria Personalista. II. O caixa faz parte das contas integrais, segundo a Teoria Materialista. III. Os empréstimos fazem parte das contas de resultado, segundo a Teoria Patrimonialista. Está correto o que se afirma em:',alternativas:['A) I, apenas','B) II, apenas','C) III, apenas','D) I e II, apenas','E) I e III, apenas'],correta:3,comentario:'O item I está correto, pois na Teoria Personalista as contas do proprietário incluem patrimônio líquido, receitas e despesas; o CMV é despesa. O item II está correto, pois Caixa é ativo e, na Teoria Materialista, ativo e passivo fazem parte das contas integrais. O item III está errado, pois empréstimos são contas patrimoniais, e não contas de resultado. Gabarito: D.'},
{numero:5,banca:'FGV – CM Aracaju/SE – Contador – 2021',pergunta:'Uma entidade vendeu todo o estoque por R$ 180.000, sendo R$ 60.000 recebidos à vista e o restante em duas parcelas. De acordo com o regime de competência, a receita a ser reconhecida no resultado de 2019 é de:',alternativas:['A) R$ 0','B) R$ 60.000','C) R$ 95.000','D) R$ 120.000','E) R$ 180.000'],correta:4,comentario:'Pelo regime de competência, a receita é reconhecida no momento da venda, independentemente do recebimento. Assim, mesmo que parte tenha sido recebida à vista e parte a prazo, toda a receita de venda deve ser reconhecida no período da transação. Gabarito: E, R$ 180.000.'},
{numero:6,banca:'FGV – Analista – TRT 16ª Região – 2022',pergunta:'Uma empresa paga aos vendedores comissão de 10% sobre as vendas. Janeiro: R$ 40.000; Fevereiro: R$ 50.000; Março: R$ 35.000. Assinale a contabilização mensal da despesa com comissão em janeiro, fevereiro e março, respectivamente:',alternativas:['A) Zero, zero e zero','B) Zero, zero e R$ 4.000','C) Zero, R$ 4.000 e R$ 5.000','D) R$ 4.000, R$ 5.000 e R$ 3.500','E) R$ 4.000, R$ 9.000 e R$ 8.500'],correta:3,comentario:'Pelo regime de competência, as despesas relacionadas à receita devem ser reconhecidas no mesmo período da receita. Janeiro: 10% de R$ 40.000 = R$ 4.000. Fevereiro: 10% de R$ 50.000 = R$ 5.000. Março: 10% de R$ 35.000 = R$ 3.500. Gabarito: D.'},
{numero:7,banca:'FGV – Analista – IMBEL – 2021',pergunta:'Em janeiro de X0, uma entidade recebeu encomenda de vestidos no valor de R$ 30.000. O valor foi recebido em fevereiro e março. A produção ocorreu em março, abril e maio, e a entrega foi feita em junho. Pelo regime de competência, a receita deve ser reconhecida:',alternativas:['A) R$ 30.000, em janeiro','B) R$ 15.000, em fevereiro e março','C) R$ 10.000, em março, abril e maio','D) R$ 30.000, em junho','E) R$ 5.000, de janeiro a junho'],correta:3,comentario:'A receita deve ser reconhecida quando ocorre a transferência do controle do bem ao cliente. Como os vestidos foram entregues apenas em junho, é nesse mês que a receita deve ser reconhecida. Os recebimentos anteriores representam obrigação da entidade até a entrega. Gabarito: D.'},
{numero:8,banca:'FGV – Contador – IMBEL – 2021',pergunta:'Uma instituição de ensino recebeu R$ 120.000 para oferecer um curso fechado de março a dezembro. De acordo com o regime de competência, assinale a afirmativa correta sobre a receita:',alternativas:['A) R$ 60.000 em janeiro','B) R$ 10.000 em fevereiro','C) R$ 12.000 em março','D) Zero em abril','E) R$ 120.000 em dezembro'],correta:2,comentario:'A receita deve ser reconhecida conforme o serviço é prestado. O curso será ministrado de março a dezembro, totalizando 10 meses. Assim, R$ 120.000 dividido por 10 meses resulta em R$ 12.000 por mês. Gabarito: C.'},
{numero:9,banca:'FGV – Analista – IMBEL – 2021',pergunta:'Uma loja realizou vendas à vista e no cartão. Em março, as vendas à vista foram de R$ 12.000 e as vendas no cartão foram de R$ 55.000. Pelo regime de competência, a receita de março foi de:',alternativas:['A) R$ 30.000','B) R$ 120.000','C) R$ 67.000','D) R$ 220.000','E) R$ 232.000'],correta:2,comentario:'Pelo regime de competência, a receita é reconhecida no mês da venda, independentemente de quando o dinheiro será recebido. Em março, a receita é R$ 12.000 + R$ 55.000 = R$ 67.000. Gabarito: C.'},
{numero:10,banca:'FGV – Supervisor – IMBEL – 2021',pergunta:'Assinale a situação em que a receita mensal contabilizada pelo Regime de Competência e pelo Regime de Caixa é a mesma.',alternativas:['A) Venda a prazo de passagem aérea para ser utilizada imediatamente','B) Venda de curso mensal de informática, cujo pagamento ocorre no último dia útil do mês das aulas','C) Venda à vista de plano trimestral em uma academia','D) Venda à vista de assinatura anual de revista','E) Recebimento de dinheiro por encomenda de roupa que ficará pronta em dois meses'],correta:1,comentario:'Os regimes de caixa e competência coincidem quando o recebimento ocorre no mesmo período em que a receita é realizada. No curso mensal pago no último dia útil do mês das aulas, o serviço é prestado no mês e o recebimento também ocorre no mesmo mês. Gabarito: B.'}
];
let atual=0,acertos=0,erros=0;
let respondidas=Array(questoes.length).fill(false);
let respostasAluno=Array(questoes.length).fill(null);
function letra(i){return ['A','B','C','D','E'][i]}
function atualizarStatus(){document.getElementById('qtd').innerText='Questão '+(atual+1)+'/'+questoes.length;document.getElementById('acertos').innerText='✅ '+acertos;document.getElementById('erros').innerText='❌ '+erros;document.getElementById('bar').style.width=((atual+1)/questoes.length*100)+'%'}
function carregarQuestao(){const q=questoes[atual];let html='<div class="questao-numero">Questão '+q.numero+'</div><div class="banca">'+q.banca+'</div><div class="pergunta">'+q.pergunta+'</div>';q.alternativas.forEach((alt,i)=>{html+='<button class="alternativa" onclick="responder('+i+')">'+alt+'</button>'});html+='<div class="comentario" id="comentario"><h3>Comentário</h3>'+q.comentario+'</div>';document.getElementById('quiz').innerHTML=html;if(respondidas[atual]){mostrarRespostaSalva()}atualizarStatus()}
function mostrarRespostaSalva(){const q=questoes[atual];const botoes=document.querySelectorAll('.alternativa');const marcada=respostasAluno[atual];botoes[q.correta].classList.add('correta');if(marcada!==q.correta&&marcada!==null)botoes[marcada].classList.add('errada');document.getElementById('comentario').style.display='block'}
function responder(indice){if(respondidas[atual])return;const q=questoes[atual];respostasAluno[atual]=indice;respondidas[atual]=true;if(indice===q.correta){acertos++}else{erros++}mostrarRespostaSalva();atualizarStatus()}
function proxima(){if(atual<questoes.length-1){atual++;carregarQuestao()}else{mostrarFinal()}}
function voltar(){if(atual>0){atual--;carregarQuestao()}}
function reiniciar(){atual=0;acertos=0;erros=0;respondidas=Array(questoes.length).fill(false);respostasAluno=Array(questoes.length).fill(null);carregarQuestao()}
function mostrarFinal(){let html='<div class="finish"><h2>Resultado Final</h2><p>✅ Acertos: '+acertos+'</p><p>❌ Erros: '+erros+'</p><p class="small">Clique no botão verde abaixo para enviar o gabarito pelo WhatsApp ao Professor Moreira.</p></div>';document.getElementById('quiz').innerHTML=html;document.getElementById('qtd').innerText='Final';document.getElementById('bar').style.width='100%'}
function enviarWhatsApp(){let texto='📚 CURSO DE CONTABILIDADE PROFESSOR MOREIRA\n';texto+='Quiz: Teoria das Contas e Regime de Competência\n\n';texto+='✅ Acertos: '+acertos+'\n';texto+='❌ Erros: '+erros+'\n\n';for(let i=0;i<questoes.length;i++){let resp=respostasAluno[i]===null?'Não respondeu':letra(respostasAluno[i]);let gab=letra(questoes[i].correta);texto+='Questão '+(i+1)+': marcou '+resp+' | gabarito '+gab+'\n'}texto+='\nAluno: ____________________';let url='https://wa.me/5561985323574?text='+encodeURIComponent(texto);window.open(url,'_blank')}
carregarQuestao();
</script>
</body>
</html>
