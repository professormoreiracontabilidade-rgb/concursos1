<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curso de Contabilidade Professor Moreira</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#061a3a;color:#fff}
.container{max-width:430px;margin:auto;min-height:100vh;padding:16px;display:flex;flex-direction:column}
header{text-align:center;background:#092b5c;padding:14px;border-radius:16px;margin-bottom:12px;border:2px solid #fff}
header h1{font-size:22px;margin:0;line-height:1.2} header p{font-size:16px;margin:7px 0 0;font-weight:bold;color:#dbeafe}
.info{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:15px;font-weight:bold}.pill{background:#0b2f66;border:1px solid #5fa8ff;border-radius:999px;padding:8px 10px;flex:1;text-align:center}
.card{background:#0b2f66;border-radius:18px;padding:18px;flex:1;box-shadow:0 0 12px rgba(255,255,255,.18)}
.questao-numero{font-size:24px;font-weight:800;color:#ffeb3b;margin-bottom:10px}.banca{font-size:18px;font-weight:700;color:#b9d9ff;margin-bottom:14px}.pergunta{font-size:20px;line-height:1.45;margin-bottom:18px}.pergunta p{margin:0 0 10px}.itens{background:#061f45;border-radius:14px;padding:12px;margin:12px 0}.itens div{margin:10px 0;font-size:19px;line-height:1.35}
table{width:100%;border-collapse:collapse;background:#fff;color:#061a3a;border-radius:10px;overflow:hidden;margin:12px 0;font-size:16px}th,td{border:1px solid #0b2f66;padding:8px;text-align:center}th:first-child,td:first-child{text-align:left;font-weight:bold;background:#eaf3ff}
.alternativa{display:block;width:100%;background:#fff;color:#061a3a;border:none;border-radius:12px;padding:14px;margin:10px 0;font-size:18px;text-align:left;font-weight:bold;cursor:pointer}.alternativa:active{transform:scale(.99)}.correta{background:#22c55e!important;color:#fff}.errada{background:#ef4444!important;color:#fff}.bloqueada{opacity:.95}
.comentario{display:none;background:#03152e;border-left:6px solid #ffeb3b;margin-top:18px;padding:14px;border-radius:12px;font-size:18px;line-height:1.45}.comentario h3{color:#ffeb3b;margin:0 0 8px}.comentario strong{color:#ffeb3b}
.navegacao{display:flex;justify-content:space-between;gap:8px;margin-top:14px}.nav-btn{flex:1;padding:14px 8px;font-size:17px;font-weight:800;border-radius:12px;border:none;background:#ffeb3b;color:#061a3a;cursor:pointer}.reiniciar{background:#fff}.whats{background:#25D366;color:#fff;width:100%;padding:16px;border:none;border-radius:14px;margin-top:12px;font-size:19px;font-weight:900;cursor:pointer}.final{display:none;text-align:center}.final h2{color:#ffeb3b;font-size:28px}.final p{font-size:21px}.footer{text-align:center;font-size:14px;margin-top:10px;color:#dbeafe;font-weight:bold;line-height:1.35}
</style>
</head>
<body>
<div class="container">
<header><h1>Curso de Contabilidade Professor Moreira</h1><p>WhatsApp: (61) 98532-3574</p></header>
<div class="info"><div class="pill" id="placar">✅ 0 | ❌ 0</div><div class="pill" id="progresso">1/10</div></div>
<div class="card"><div id="quiz"></div><div class="final" id="telaFinal"></div></div>
<div class="navegacao"><button class="nav-btn" onclick="voltar()">⬅ Voltar</button><button class="nav-btn reiniciar" onclick="reiniciar()">🔄 Reiniciar</button><button class="nav-btn" onclick="proxima()">Próxima ➡</button></div>
<button class="whats" onclick="enviarWhatsApp()">📲 Enviar gabarito pelo WhatsApp</button>
<div class="footer">Curso de Contabilidade Professor Moreira<br>WhatsApp: (61) 98532-3574</div>
</div>
<script>
const questoes=[
{numero:1,banca:'FGV – Agente – PC/RN – 2021',pergunta:`<p>O contador de uma empresa registrou diretamente em uma conta de resultado (despesa) a aquisição de material de expediente para estoque, que só deveria ser baixado como despesa quando requisitado.</p><p>Para efetuar a retificação do lançamento contábil, deve-se realizar um(a):</p>`,alternativas:['A) Compensação','B) Complementação','C) Estorno total','D) Estorno parcial','E) Transferência'],correta:4,comentario:'O material de expediente ainda não foi consumido. Portanto, deveria estar no ativo, como estoque. Como o crédito em Caixa está correto, basta transferir o valor da despesa para a conta de estoque. <strong>Gabarito: E.</strong>'},
{numero:2,banca:'FGV – Contador – INEA – 2013',pergunta:`<p>A teoria da contabilidade que divide as contas em patrimoniais e de resultado é denominada:</p>`,alternativas:['A) Reditualista','B) Personalista','C) Aziendalista','D) Materialista','E) Patrimonialista'],correta:4,comentario:'A Teoria Patrimonialista divide as contas em patrimoniais — Ativo, Passivo e Patrimônio Líquido — e contas de resultado — Receitas e Despesas. <strong>Gabarito: E.</strong>'},
{numero:3,banca:'FGV – Contador – SUDENE – 2013',pergunta:`<p>Assinale a alternativa que indica as contas que são classificadas como patrimoniais, integrais e em agentes consignatários concomitantemente.</p>`,alternativas:['A) Clientes, fornecedores e capital social','B) Salários a pagar, reserva de lucros e caixa','C) Receita, despesa com pessoal e custo de mercadorias vendidas','D) Estoque, banco conta movimento e veículo','E) Empréstimos a receber, empréstimos a pagar e dividendos a pagar'],correta:3,comentario:'Para ser patrimonial, integral e agente consignatário ao mesmo tempo, a conta deve representar um bem. Estoque, banco conta movimento e veículo são bens. <strong>Gabarito: D.</strong>'},
{numero:4,banca:'FGV – Especialista – SEMSA Manaus – 2022',pergunta:`<p>À luz da Teoria das Contas, analise as assertivas a seguir.</p><div class="itens"><div>I. O custo da mercadoria vendida é uma conta dos proprietários, segundo a Teoria Personalista.</div><div>II. O caixa faz parte das contas integrais, segundo a Teoria Materialista.</div><div>III. Os empréstimos fazem parte das contas de resultado, segundo a Teoria Patrimonialista.</div></div><p>Está correto o que se afirma em:</p>`,alternativas:['A) I, apenas','B) II, apenas','C) III, apenas','D) I e II, apenas','E) I e III, apenas'],correta:3,comentario:'I está correta, pois despesas pertencem às contas do proprietário na Teoria Personalista. II está correta, pois Caixa é ativo e faz parte das contas integrais na Teoria Materialista. III está errada, pois empréstimos são contas patrimoniais, e não contas de resultado. <strong>Gabarito: D.</strong>'},
{numero:5,banca:'FGV – CM Aracaju/SE – Contador – 2021',pergunta:`<p>Em 10/11/2019, uma entidade detinha itens no estoque no total de R$ 95.000,00. No dia 20/11/2019, vendeu todo o estoque por R$ 180.000,00, sendo R$ 60.000,00 recebidos à vista e o restante em duas parcelas.</p><p>De acordo com o regime de competência, a receita a ser reconhecida no resultado de 2019 é de:</p>`,alternativas:['A) R$ 0','B) R$ 60.000,00','C) R$ 95.000,00','D) R$ 120.000,00','E) R$ 180.000,00'],correta:4,comentario:'Pelo regime de competência, a receita é reconhecida quando ocorre a venda, independentemente do recebimento. Como a venda foi de R$ 180.000,00, toda a receita deve ser reconhecida em 2019. <strong>Gabarito: E.</strong>'},
{numero:6,banca:'FGV – Analista – TRT 16ª Região – 2022',pergunta:`<p>Uma empresa comercial vende apenas por cartão de crédito, de modo que os montantes são recebidos no mês seguinte ao da realização das vendas. A loja paga aos vendedores uma comissão de 10% sobre as vendas.</p><p>No primeiro trimestre de X0, a Receita de vendas foi a seguinte:</p><div class="itens"><div>Janeiro: R$40.000</div><div>Fevereiro: R$50.000</div><div>Março: R$35.000</div></div><p>Assinale a opção que indica a contabilização mensal da despesa com comissão de vendedores, em janeiro, fevereiro e março, respectivamente.</p>`,alternativas:['A) zero, zero e zero','B) Zero, zero e R$4.000','C) Zero, R$4.000 e R$5.000','D) R$4.000, R$5.000 e R$3.500','E) R$4.000, R$9.000 e R$8.500'],correta:3,comentario:'A despesa de comissão acompanha a receita pelo regime de competência. Janeiro: 10% de R$ 40.000 = R$ 4.000. Fevereiro: 10% de R$ 50.000 = R$ 5.000. Março: 10% de R$ 35.000 = R$ 3.500. <strong>Gabarito: D.</strong>'},
{numero:7,banca:'FGV – Analista – IMBEL – 2021',pergunta:`<p>Em janeiro de X0, uma entidade recebeu uma encomenda de vestidos no valor de R$30.000. O valor foi recebido em fevereiro e março. A entidade produziu os vestidos em março, abril e maio, e a entrega foi feita em junho.</p><p>De acordo com o Regime de Competência, a receita deve ser reconhecida:</p>`,alternativas:['A) R$ 30.000, em janeiro','B) R$ 15.000, em fevereiro e março','C) R$ 10.000, em março, abril e maio','D) R$ 30.000, em junho','E) R$ 5.000, de janeiro a junho'],correta:3,comentario:'A receita é reconhecida quando ocorre a transferência do controle do bem ao cliente. Como os vestidos foram entregues em junho, a receita deve ser reconhecida em junho. <strong>Gabarito: D.</strong>'},
{numero:8,banca:'FGV – Contador – IMBEL – 2021',pergunta:`<p>Uma instituição de ensino assinou contrato para oferecer um curso fechado a uma empresa nos meses de março a dezembro. Pelo treinamento recebeu R$ 120.000.</p><p>Em relação à contabilização da receita de treinamento, de acordo com o Regime de Competência, assinale a afirmativa correta.</p>`,alternativas:['A) R$ 60.000 em janeiro','B) R$ 10.000 em fevereiro','C) R$ 12.000 em março','D) Zero em abril','E) R$ 120.000 em dezembro'],correta:2,comentario:'O serviço será prestado de março a dezembro, totalizando 10 meses. Assim, R$ 120.000 dividido por 10 meses resulta em R$ 12.000 por mês. <strong>Gabarito: C.</strong>'},
{numero:9,banca:'FGV – Analista – IMBEL – 2021',pergunta:`<p>Uma loja realizava vendas à vista e em cartão de crédito, sendo que estas eram recebidas no mês seguinte à venda. A loja registrou as seguintes vendas no primeiro trimestre de X0:</p><table><tr><th></th><th>Janeiro</th><th>Fevereiro</th><th>Março</th></tr><tr><td>Vendas à vista</td><td>30.000</td><td>20.000</td><td>12.000</td></tr><tr><td>Vendas no cartão</td><td>100.000</td><td>70.000</td><td>55.000</td></tr></table><p>Em relação à receita da loja, de acordo com o Regime de Competência, assinale a afirmativa correta.</p>`,alternativas:['A) Em janeiro, a receita foi de R$ 30.000','B) Em fevereiro, a receita foi de R$ 120.000','C) Em março, a receita foi de R$ 67.000','D) No trimestre, a receita foi de R$ 220.000','E) No trimestre, a receita foi de R$ 232.000'],correta:2,comentario:'No regime de competência, considera-se a venda realizada, independentemente do recebimento. Janeiro: 30.000 + 100.000 = 130.000. Fevereiro: 20.000 + 70.000 = 90.000. Março: 12.000 + 55.000 = 67.000. <strong>Gabarito: C.</strong>'},
{numero:10,banca:'FGV – Supervisor – IMBEL – 2021',pergunta:`<p>Assinale a opção que indica a situação em que a receita mensal contabilizada pelo Regime de Competência e pelo Regime de Caixa é a mesma.</p>`,alternativas:['A) Venda a prazo de passagem aérea para ser utilizada imediatamente','B) Venda de curso mensal de informática, cujo pagamento ocorre no último dia útil do mês das aulas','C) Venda à vista de plano trimestral em uma academia','D) Venda à vista de assinatura anual de revista','E) Recebimento de dinheiro por encomenda de roupa que ficará pronta em dois meses'],correta:1,comentario:'Os dois regimes coincidem quando o recebimento ocorre no mesmo período da prestação do serviço. No curso mensal pago no último dia útil do mês, a prestação e o recebimento ocorrem no mesmo mês. <strong>Gabarito: B.</strong>'}
];
let atual=0;let respondidas=Array(questoes.length).fill(false);let respostas=Array(questoes.length).fill(null);let acertos=0;let erros=0;
function atualizarPlacar(){document.getElementById('placar').innerHTML=`✅ ${acertos} | ❌ ${erros}`;document.getElementById('progresso').innerHTML=`${Math.min(atual+1,questoes.length)}/${questoes.length}`}
function carregarQuestao(){document.getElementById('telaFinal').style.display='none';document.getElementById('quiz').style.display='block';const q=questoes[atual];document.getElementById('quiz').innerHTML=`<div class="questao-numero">Questão ${q.numero} de ${questoes.length}</div><div class="banca">${q.banca}</div><div class="pergunta">${q.pergunta}</div>${q.alternativas.map((alt,i)=>`<button class="alternativa" onclick="responder(${i})">${alt}</button>`).join('')}<div class="comentario" id="comentario"><h3>Comentário</h3>${q.comentario}</div>`;if(respondidas[atual]){mostrarRespostaSalva()}atualizarPlacar()}
function mostrarRespostaSalva(){const botoes=document.querySelectorAll('.alternativa');const q=questoes[atual];botoes.forEach(b=>b.classList.add('bloqueada'));if(respostas[atual]===q.correta){botoes[q.correta].classList.add('correta')}else{botoes[respostas[atual]].classList.add('errada');botoes[q.correta].classList.add('correta')}document.getElementById('comentario').style.display='block'}
function responder(indice){if(respondidas[atual])return;const q=questoes[atual];respostas[atual]=indice;respondidas[atual]=true;if(indice===q.correta){acertos++}else{erros++}mostrarRespostaSalva();atualizarPlacar()}
function proxima(){if(atual<questoes.length-1){atual++;carregarQuestao()}else{mostrarFinal()}}
function voltar(){if(atual>0){atual--;carregarQuestao()}}
function reiniciar(){atual=0;respondidas=Array(questoes.length).fill(false);respostas=Array(questoes.length).fill(null);acertos=0;erros=0;carregarQuestao()}
function mostrarFinal(){document.getElementById('quiz').style.display='none';const final=document.getElementById('telaFinal');final.style.display='block';final.innerHTML=`<h2>Resultado Final</h2><p>✅ Acertos: <strong>${acertos}</strong></p><p>❌ Erros: <strong>${erros}</strong></p><p>Total respondido: ${respondidas.filter(Boolean).length} de ${questoes.length}</p><p>Clique no botão verde para enviar o gabarito ao Professor Moreira.</p>`}
function enviarWhatsApp(){let texto='📚 CURSO DE CONTABILIDADE PROFESSOR MOREIRA%0A';texto+='Quiz de Contabilidade - Regimes e Teorias das Contas%0A%0A';texto+='✅ Acertos: '+acertos+'%0A';texto+='❌ Erros: '+erros+'%0A%0A';for(let i=0;i<questoes.length;i++){let marcada=respostas[i]===null?'Não respondeu':questoes[i].alternativas[respostas[i]];let correta=questoes[i].alternativas[questoes[i].correta];texto+='Questão '+(i+1)+': '+marcada+'%0A';texto+='Gabarito: '+correta+'%0A%0A'}window.open('https://wa.me/5561985323574?text='+texto,'_blank')}
carregarQuestao();
</script>
</body>
</html>
